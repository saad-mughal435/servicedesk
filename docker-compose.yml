# Local full-stack parity: the app on gunicorn + a Postgres database.
# Usage: docker compose up --build  → http://localhost:8000 (agent / demo12345)
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: servicedesk
      POSTGRES_PASSWORD: servicedesk
      POSTGRES_DB: servicedesk
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U servicedesk"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    environment:
      SECRET_KEY: local-compose-not-secret
      DEBUG: "false"
      DEMO_MODE: "true"
      DATABASE_URL: postgres://servicedesk:servicedesk@db:5432/servicedesk
      ALLOWED_HOSTS: localhost,127.0.0.1
      CSRF_TRUSTED_ORIGINS: http://localhost:8000
      SECURE_SSL_REDIRECT: "false"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
