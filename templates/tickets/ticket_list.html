{% extends "base.html" %}
{% block title %}Tickets - Service Desk{% endblock %}
{% block content %}
<div class="page-head">
  <h1>Tickets</h1>
  <a class="btn" href="{% url 'ticket-create' %}">New ticket</a>
</div>

<form method="get" class="filters">
  <input type="search" name="q" value="{{ q }}" placeholder="Search title / description / key…">
  <select name="status" onchange="this.form.submit()">
    <option value="">All statuses</option>
    {% for value, label in statuses %}
      <option value="{{ value }}" {% if value == status_f %}selected{% endif %}>{{ label }}</option>
    {% endfor %}
  </select>
  <select name="priority" onchange="this.form.submit()">
    <option value="">All priorities</option>
    {% for value, label in priorities %}
      <option value="{{ value }}" {% if value == priority_f %}selected{% endif %}>{{ label }}</option>
    {% endfor %}
  </select>
  <noscript><button type="submit" class="btn">Filter</button></noscript>
</form>

<table class="grid">
  <thead>
    <tr><th>Key</th><th>Title</th><th>Priority</th><th>Status</th><th>Assignee</th><th>SLA due</th></tr>
  </thead>
  {% include "tickets/_ticket_rows.html" %}
</table>
<p class="muted" style="font-size:.8rem">Live — the board refreshes automatically every 10s.</p>
{% endblock %}
